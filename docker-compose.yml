version: "3.9"

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW_CONN_POSTGRES_DEFAULT: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW_POSTGRES_CONN_ID: ${AIRFLOW_POSTGRES_CONN_ID}
    REPORTS_DIR: /opt/airflow/reports
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./reports:/opt/airflow/reports
  depends_on:
    - postgres
  networks:
    - fintech_net

services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    env_file:
      - .env
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - fintech_net

  kafka-topic-init:
    image: bitnami/kafka:3.7
    container_name: kafka-topic-init
    env_file:
      - .env
    depends_on:
      - kafka
    entrypoint: ["/bin/bash", "/scripts/create_topics.sh"]
    volumes:
      - ./docker/create_topics.sh:/scripts/create_topics.sh:ro
    networks:
      - fintech_net

  postgres:
    image: postgres:16
    container_name: postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - fintech_net

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: producer
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC}
      HIGH_VALUE_THRESHOLD: ${HIGH_VALUE_THRESHOLD}
      IMPOSSIBLE_TRAVEL_WINDOW_MINUTES: ${IMPOSSIBLE_TRAVEL_WINDOW_MINUTES}
      TX_PER_SECOND: ${TX_PER_SECOND}
      FRAUD_PROBABILITY: ${FRAUD_PROBABILITY}
      RANDOM_SEED: ${RANDOM_SEED}
    command: ["sleep", "infinity"]
    depends_on:
      - kafka
    networks:
      - fintech_net

  spark:
    build:
      context: .
      dockerfile: spark/Dockerfile
    container_name: spark
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      HIGH_VALUE_THRESHOLD: ${HIGH_VALUE_THRESHOLD}
      IMPOSSIBLE_TRAVEL_WINDOW_MINUTES: ${IMPOSSIBLE_TRAVEL_WINDOW_MINUTES}
      WATERMARK_DELAY: ${WATERMARK_DELAY}
      SPARK_CHECKPOINT_ROOT: /tmp/spark-checkpoints
    volumes:
      - ./warehouse:/project/warehouse
      - ./reports:/project/reports
    command: ["sleep", "infinity"]
    depends_on:
      - kafka
      - postgres
    networks:
      - fintech_net

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USERNAME}
      --password ${AIRFLOW_ADMIN_PASSWORD}
      --firstname Airflow
      --lastname Admin
      --role Admin
      --email ${AIRFLOW_ADMIN_EMAIL}
      "

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      - airflow-init

networks:
  fintech_net:
    driver: bridge

volumes:
  kafka_data:
  postgres_data:
